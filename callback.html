<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBooks OAuth Callback</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #333; line-height: 1.6; }
    h1 { font-size: 1.5rem; }
    .code-box { background: #f4f4f4; border: 1px solid #ddd; border-radius: 6px; padding: 16px; font-family: monospace; font-size: 0.85rem; word-break: break-all; user-select: all; margin: 12px 0; }
    .label { font-weight: 600; margin-top: 16px; }
    .success { color: #2E8B57; }
    button { padding: 8px 16px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; margin-top: 8px; }
    button:hover { background: #f0f0f0; }
  </style>
</head>
<body>
  <h1 id="heading">QuickBooks OAuth Callback</h1>
  <p id="instructions"></p>
  <div class="label">Full Callback URL:</div>
  <div class="code-box" id="url"></div>
  <button id="copy-btn" style="display:none">Copy URL</button>
  <div class="label">Auth Code:</div>
  <div class="code-box" id="code"></div>
  <div class="label">Realm ID:</div>
  <div class="code-box" id="realm"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const realmId = params.get('realmId');

    document.getElementById('url').textContent = window.location.href;
    document.getElementById('code').textContent = code || 'None';
    document.getElementById('realm').textContent = realmId || 'None';

    if (code) {
      document.getElementById('heading').textContent = 'QuickBooks Connected';
      document.getElementById('heading').classList.add('success');
      document.getElementById('instructions').textContent = 'Copy the full URL below and paste it into your terminal:';
      var btn = document.getElementById('copy-btn');
      btn.style.display = 'inline-block';
      btn.addEventListener('click', function() {
        navigator.clipboard.writeText(document.getElementById('url').textContent);
      });
    } else {
      document.getElementById('instructions').textContent = 'No authorization code received. Please try the OAuth flow again.';
    }
  </script>
</body>
</html>
